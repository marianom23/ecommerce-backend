# ==========================================================
# CONFIGURACIÓN DE PRODUCCIÓN (OPTIMIZADA PARA RAILWAY/PROXIES)
# ==========================================================

# Base de Datos
# Usamos solo la URL porque Railway ya incluye user/pass en ella
spring.datasource.url=${DB_URL}
# Dejamos estos vacíos o con fallback para no sobreescribir lo que venga en la URL
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP - Ajustes de Timeout para evitar bloqueos
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Mejora para conexiones SSL lentas
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# DESACTIVAR REDIS/CACHE (Si no tienes servidor de Redis configurado en Prod)
# Esto evita que la app crashee intentando buscar un Redis local
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# Logging
logging.level.root=INFO
logging.level.com.empresa.ecommerce_backend=INFO
logging.level.com.zaxxer.hikari=INFO

