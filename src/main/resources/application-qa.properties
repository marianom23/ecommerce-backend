# ========== App Info ==========
spring.application.name=ecommerce-backend
server.port=8080

# ========== Database (QA - Local) ==========
# Usamos la base local "ecommerce_qa"
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_qa
spring.datasource.username=postgres
spring.datasource.password=4964

# "update" asegura que el esquema se actualice sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========== App Custom ==========
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}
app.mail.from=${MAIL_FROM:noreply@hornerotech.com.ar}
app.mail.subject.verify=Verifica tu cuenta
app.admin.email=hornerotech@gmail.com
app.cookie.domain=${app.cookie.domain:hornerotech.com.ar}

# ========== JWT ==========
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ========== Flyway ==========
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ========== Mercado Pago ==========
mp.access-token=${MP_ACCESS_TOKEN}
mp.webhook-url=${MP_WEBHOOK_URL}
front.base-url=${FRONT_BASE_URL:http://localhost:3000}

# ========== OAuth2 (Requerido por JwtServiceImpl) ==========
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.azure.scope=openid,profile,email,User.Read
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/azure
spring.security.oauth2.client.registration.azure.client-name=Microsoft

spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure.user-name-attribute=sub

AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID}

# ========== Resend ==========
resend.api-key=${RESEND_API_KEY}

# ========== Meta Pixel ==========
# (Opcional, si tu backend lo usa)
META_PIXEL_ID=${META_PIXEL_ID}
META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
meta.test-mode=${meta.test-mode:false}
META_TEST_CODE=${META_TEST_CODE}

# NOTA: DataSeeder NO correrá porque tiene @Profile("dev")
